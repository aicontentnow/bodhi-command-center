<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BODHI COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Outfit', sans-serif;
    --font-body: 'Sora', sans-serif;
    --accent-pink: #FFB6C1;
    --accent-teal: #5BC0BE;
    --accent-lavender: #B8B8FF;
    --accent-coral: #FF9A8B;
    --accent-mint: #88D8B0;
    --glass-blur: 24px;
    --card-radius: 20px;
    --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    --status-active: #34D399;
    --status-active-bg: rgba(52, 211, 153, 0.12);
    --status-progress: #FBBF24;
    --status-progress-bg: rgba(251, 191, 36, 0.12);
    --status-blocked: #F87171;
    --status-blocked-bg: rgba(248, 113, 113, 0.12);
    --status-idle: #6B7280;
    --status-idle-bg: rgba(107, 114, 128, 0.08);
  }

  [data-theme="light"] {
    --bg-primary: #F0F1F6; --bg-secondary: #E4E5ED;
    --bg-glass: rgba(255, 255, 255, 0.5); --bg-glass-hover: rgba(255, 255, 255, 0.7);
    --bg-glass-strong: rgba(255, 255, 255, 0.75); --bg-sidebar: rgba(255, 255, 255, 0.4);
    --border-glass: rgba(255, 255, 255, 0.6); --border-subtle: rgba(0, 0, 0, 0.06);
    --text-primary: #1A1A2E; --text-secondary: #4A4A6A; --text-tertiary: #7A7A9A;
    --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.05), 0 1px 6px rgba(0, 0, 0, 0.03);
    --shadow-card-hover: 0 8px 44px rgba(0, 0, 0, 0.1), 0 2px 10px rgba(0, 0, 0, 0.05);
    --shadow-glow: 0 0 80px rgba(91, 192, 190, 0.12);
    --mesh-opacity: 0.35;
    --notif-bg: rgba(248, 113, 113, 0.08); --notif-border: rgba(248, 113, 113, 0.2);
  }
  [data-theme="dark"] {
    --bg-primary: #0B0B18; --bg-secondary: #111126;
    --bg-glass: rgba(22, 22, 48, 0.6); --bg-glass-hover: rgba(30, 30, 65, 0.75);
    --bg-glass-strong: rgba(18, 18, 42, 0.8); --bg-sidebar: rgba(15, 15, 35, 0.5);
    --border-glass: rgba(255, 255, 255, 0.08); --border-subtle: rgba(255, 255, 255, 0.06);
    --text-primary: #F0F0FF; --text-secondary: #B8B8D8; --text-tertiary: #8080A8;
    --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.25), 0 1px 6px rgba(0, 0, 0, 0.18);
    --shadow-card-hover: 0 8px 44px rgba(0, 0, 0, 0.4), 0 2px 10px rgba(0, 0, 0, 0.25);
    --shadow-glow: 0 0 80px rgba(91, 192, 190, 0.06);
    --mesh-opacity: 0.2;
    --notif-bg: rgba(248, 113, 113, 0.06); --notif-border: rgba(248, 113, 113, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 18px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary);
    min-height: 100vh; overflow-x: hidden;
    transition: background var(--transition-smooth), color var(--transition-smooth);
  }

  /* AMBIENT BACKGROUND */
  .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; opacity: var(--mesh-opacity); transition: opacity var(--transition-smooth); }
  .ambient-orb { position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform; }
  .ambient-orb--1 { width: 700px; height: 700px; background: radial-gradient(circle, var(--accent-pink), transparent 70%); top: -12%; left: -8%; animation: orb-drift-1 25s ease-in-out infinite; }
  .ambient-orb--2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-teal), transparent 70%); top: 25%; right: -10%; animation: orb-drift-2 30s ease-in-out infinite; }
  .ambient-orb--3 { width: 550px; height: 550px; background: radial-gradient(circle, var(--accent-lavender), transparent 70%); bottom: -8%; left: 25%; animation: orb-drift-3 28s ease-in-out infinite; }
  .ambient-orb--4 { width: 400px; height: 400px; background: radial-gradient(circle, var(--accent-mint), transparent 70%); top: 55%; left: 5%; animation: orb-drift-4 22s ease-in-out infinite; }
  @keyframes orb-drift-1 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(80px,50px) scale(1.1); } 66% { transform: translate(-30px,80px) scale(0.95); } }
  @keyframes orb-drift-2 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-60px,40px) scale(1.05); } 66% { transform: translate(40px,-60px) scale(0.9); } }
  @keyframes orb-drift-3 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(50px,-40px) scale(1.08); } 66% { transform: translate(-40px,-30px) scale(0.95); } }
  @keyframes orb-drift-4 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-40px,-50px) scale(1.1); } 66% { transform: translate(60px,30px) scale(0.92); } }

  /* GLASS SYSTEM */
  .glass {
    background: var(--bg-glass); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--border-glass); border-radius: var(--card-radius);
    box-shadow: var(--shadow-card); transition: all var(--transition-smooth); position: relative; overflow: hidden;
  }
  .glass::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); }
  .glass:hover { background: var(--bg-glass-hover); box-shadow: var(--shadow-card-hover); }
  .glass--clickable { cursor: pointer; }
  .glass--clickable:hover { transform: translateY(-3px); }
  .glass--clickable:active { transform: translateY(-1px); }

  /* MAIN LAYOUT */
  .app-shell { position: relative; z-index: 1; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; gap: 0; }

  /* HEADER */
  .header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 20px 36px; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid var(--border-subtle); }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .header-title { font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; letter-spacing: 0.08em; background: linear-gradient(135deg, var(--accent-teal), var(--accent-lavender), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-clock { font-family: var(--font-display); font-weight: 500; font-size: 0.95rem; color: var(--text-secondary); letter-spacing: 0.03em; }
  .header-status { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }
  .pulse-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse-glow 2s ease-in-out infinite; }
  .pulse-dot--green { background: var(--status-active); }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.45); } 50% { box-shadow: 0 0 0 7px rgba(52,211,153,0); } }
  .header-right { display: flex; align-items: center; gap: 16px; }

  /* Theme toggle */
  .theme-toggle { width: 56px; height: 32px; border-radius: 16px; background: var(--bg-secondary); border: 1px solid var(--border-subtle); cursor: pointer; position: relative; transition: all var(--transition-smooth); display: flex; align-items: center; padding: 0 5px; }
  .theme-toggle:hover { border-color: var(--accent-teal); }
  .theme-toggle-knob { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-teal), var(--accent-lavender)); transition: transform var(--transition-bounce); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  [data-theme="dark"] .theme-toggle-knob { transform: translateX(24px); }
  .theme-label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.05em; }

  /* SIDEBAR */
  .sidebar { padding: 16px 14px; border-right: 1px solid var(--border-subtle); overflow-y: auto; max-height: calc(100vh - 80px); display: flex; flex-direction: column; gap: 8px; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

  /* NAV ITEMS */
  .nav-section { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px; font-family: var(--font-display); font-weight: 600; font-size: 0.95rem; color: var(--text-secondary); cursor: pointer; transition: all var(--transition-smooth); border: 1px solid transparent; letter-spacing: 0.02em; }
  .nav-item:hover { background: var(--bg-glass); color: var(--text-primary); }
  .nav-item--active { background: var(--bg-glass-hover); color: var(--text-primary); border-color: var(--accent-teal); box-shadow: 0 0 0 1px var(--accent-teal), var(--shadow-card); }
  .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
  .nav-label { flex: 1; }
  .nav-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--accent-coral); color: #0B0B18; }
  .nav-divider { height: 1px; background: var(--border-subtle); margin: 8px 8px; }

  /* SECTION HEADERS */
  .section-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-hdr h2 { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); white-space: nowrap; }
  .section-hdr-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-subtle), transparent); }
  .badge { font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); background: var(--bg-glass); padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border-subtle); }

  /* PROJECT CARDS */
  .project-list { display: flex; flex-direction: column; gap: 8px; }
  .project-card { padding: 14px 16px; cursor: pointer; border-radius: 14px; }
  .project-card--selected { background: var(--bg-glass-hover) !important; border-color: var(--accent-teal) !important; box-shadow: var(--shadow-card-hover), 0 0 0 1px var(--accent-teal); }
  .project-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .project-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--text-primary); }
  .project-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1rem; opacity: 0.8; }
  .project-meta { display: flex; align-items: center; gap: 10px; }
  .status-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; font-family: var(--font-display); letter-spacing: 0.04em; text-transform: uppercase; }
  .status-chip--active { background: var(--status-active-bg); color: var(--status-active); }
  .status-chip--progress { background: var(--status-progress-bg); color: var(--status-progress); }
  .status-chip--blocked { background: var(--status-blocked-bg); color: var(--status-blocked); }
  .status-chip--idle { background: var(--status-idle-bg); color: var(--status-idle); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-dot--active { background: var(--status-active); }
  .status-dot--progress { background: var(--status-progress); }
  .status-dot--blocked { background: var(--status-blocked); }
  .status-dot--idle { background: var(--status-idle); }
  .project-time { font-size: 0.8rem; color: var(--text-tertiary); }

  /* MAIN CONTENT */
  .main-content { padding: 24px 36px; overflow-y: auto; max-height: calc(100vh - 80px); display: flex; flex-direction: column; gap: 24px; }
  .main-content::-webkit-scrollbar { width: 6px; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

  /* NOTIFICATION BAR */
  .notif-bar { background: var(--notif-bg); border: 1px solid var(--notif-border); border-radius: var(--card-radius); padding: 20px 28px; position: relative; overflow: hidden; }
  .notif-bar::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--status-blocked), var(--status-progress)); border-radius: 0 2px 2px 0; }
  .notif-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .notif-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--status-blocked); }
  .notif-count { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; background: var(--status-blocked); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .notif-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--status-blocked); animation: pulse-red 2s ease-in-out infinite; }
  @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); } 50% { box-shadow: 0 0 0 6px rgba(248,113,113,0); } }
  .notif-items { display: flex; flex-direction: column; gap: 12px; }
  .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 18px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); cursor: pointer; transition: all var(--transition-smooth); }
  .notif-item:hover { background: rgba(255,255,255,0.06); border-color: var(--accent-teal); transform: translateX(4px); }
  .notif-item-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 50%; margin-top: 8px; }
  .notif-item-content { flex: 1; }
  .notif-item-text { font-size: 1rem; color: var(--text-primary); line-height: 1.5; font-weight: 400; }
  .notif-item-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .notif-item-time { font-size: 0.8rem; color: var(--text-tertiary); font-family: var(--font-display); }
  .notif-item-source { font-size: 0.8rem; color: var(--accent-teal); font-family: var(--font-display); font-weight: 600; }
  .notif-item-arrow { font-size: 1.1rem; color: var(--text-tertiary); margin-top: 4px; transition: all var(--transition-smooth); }
  .notif-item:hover .notif-item-arrow { color: var(--accent-teal); transform: translateX(4px); }

  /* ACTIVITY FEED */
  .feed-panel { flex: 1; }
  .feed-list { display: flex; flex-direction: column; gap: 4px; }
  .feed-item { display: flex; align-items: flex-start; gap: 18px; padding: 14px 18px; border-radius: 14px; transition: all var(--transition-smooth); cursor: default; border: 1px solid transparent; }
  .feed-item:hover { background: var(--bg-glass); border-color: var(--border-glass); }
  .feed-time { width: 90px; min-width: 90px; text-align: right; font-size: 0.85rem; font-weight: 500; color: var(--text-tertiary); font-family: var(--font-display); padding-top: 3px; }
  .feed-dot-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 6px; }
  .feed-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .feed-line { width: 2px; flex: 1; min-height: 20px; background: linear-gradient(180deg, var(--border-subtle), transparent); margin-top: 4px; }
  .feed-body { flex: 1; padding-top: 1px; }
  .feed-source { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
  .feed-text { font-size: 1rem; color: var(--text-secondary); line-height: 1.55; }

  /* AGENT SECTION */
  .agent-groups { display: flex; flex-direction: column; gap: 14px; }
  .agent-group-label { font-family: var(--font-display); font-weight: 600; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; padding-left: 2px; }
  .agent-list { display: flex; flex-direction: column; gap: 4px; }
  .agent-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle); transition: all var(--transition-smooth); cursor: default; }
  .agent-row:hover { background: var(--bg-glass); border-color: var(--border-glass); }
  .agent-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 50%; }
  .agent-dot--active { background: var(--status-active); }
  .agent-dot--idle { background: var(--status-idle); }
  .agent-dot--running { background: var(--accent-teal); animation: pulse-running 1.5s ease-in-out infinite; }
  @keyframes pulse-running { 0%, 100% { box-shadow: 0 0 0 0 rgba(91,192,190,0.5); opacity: 1; } 50% { box-shadow: 0 0 0 5px rgba(91,192,190,0); opacity: 0.7; } }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-family: var(--font-display); font-weight: 600; font-size: 0.85rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-row--disabled .agent-name { color: var(--text-tertiary); }
  .agent-schedule { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 1px; }
  .agent-last { font-size: 0.75rem; color: var(--text-tertiary); white-space: nowrap; }

  /* LOGIN SCREEN */
  .login-shell { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); }
  .login-card { width: 380px; max-width: 90vw; padding: 48px 40px; text-align: center; }
  .login-title { font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; letter-spacing: 0.1em; background: linear-gradient(135deg, var(--accent-teal), var(--accent-lavender), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .login-subtitle { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 36px; }
  .login-input { width: 100%; padding: 14px 20px; border-radius: 14px; background: var(--bg-secondary); border: 1px solid var(--border-subtle); color: var(--text-primary); font-family: var(--font-body); font-size: 1rem; outline: none; transition: all var(--transition-smooth); letter-spacing: 0.08em; }
  .login-input:focus { border-color: var(--accent-teal); box-shadow: 0 0 0 3px rgba(91,192,190,0.15); }
  .login-input::placeholder { color: var(--text-tertiary); }
  .login-input-wrap { margin-bottom: 20px; }
  .login-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--accent-teal), var(--accent-lavender)); color: #0B0B18; font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: 0.08em; cursor: pointer; transition: all var(--transition-smooth); }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(91,192,190,0.3); }
  .login-error { color: var(--status-blocked); font-size: 0.85rem; margin-top: 12px; font-weight: 500; min-height: 20px; }
  .login-fade-in { animation: login-appear 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes login-appear { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* DEBRIEF VIEW */
  .debrief-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
  .debrief-title { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; letter-spacing: 0.04em; color: var(--text-primary); }
  .debrief-meta { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; color: var(--text-secondary); font-family: var(--font-display); }
  .debrief-context { padding: 18px 24px; margin-bottom: 8px; border-left: 3px solid var(--accent-coral); background: rgba(255,154,139,0.08); border-radius: 0 14px 14px 0; font-size: 1rem; color: var(--text-primary); line-height: 1.5; flex-shrink: 0; }
  .debrief-context strong { color: var(--accent-coral); font-weight: 600; }

  /* COLLAPSIBLE DEBRIEF SECTIONS */
  .debrief-section { border-radius: var(--card-radius); position: relative; border: 1px solid; flex-shrink: 0; }
  .debrief-section::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px; border-radius: 0 2px 2px 0; }
  .debrief-section--urgent::before { background: linear-gradient(180deg, #F87171, #FF9A8B); }
  .debrief-section--urgent { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.18); }
  .debrief-section--priority::before { background: linear-gradient(180deg, var(--accent-teal), #60A5FA); }
  .debrief-section--priority { background: rgba(91,192,190,0.06); border-color: rgba(91,192,190,0.15); }
  .debrief-section--delegated::before { background: linear-gradient(180deg, var(--accent-lavender), var(--accent-pink)); }
  .debrief-section--delegated { background: rgba(184,184,255,0.06); border-color: rgba(184,184,255,0.15); }
  .debrief-section--info::before { background: linear-gradient(180deg, var(--accent-mint), var(--accent-teal)); }
  .debrief-section--info { background: rgba(136,216,176,0.06); border-color: rgba(136,216,176,0.12); }
  .debrief-section--upcoming::before { background: linear-gradient(180deg, var(--accent-pink), var(--accent-lavender)); }
  .debrief-section--upcoming { background: rgba(255,182,193,0.06); border-color: rgba(255,182,193,0.12); }

  /* Clickable section header */
  .debrief-section-hdr {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 28px; cursor: pointer; user-select: none;
    transition: background var(--transition-smooth);
  }
  .debrief-section-hdr:hover { background: rgba(255,255,255,0.03); }
  .debrief-section-icon { font-size: 1.3rem; }
  .debrief-section-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase; flex: 1; }

  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);

function LoginScreen({ onAuth }) {
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const handleSubmit = async (e) => {
    e.preventDefault(); setLoading(true); setError('');
    const hash = await sha256(pw);
    if (hash === PASSWORD_HASH) { onAuth(); } else { setError('Access denied'); setPw(''); }
    setLoading(false);
  };
  return (
    <div className="login-shell">
      <div className="glass login-card login-fade-in">
        <div className="login-title">COMMAND CENTER</div>
        <div className="login-subtitle">Authenticated access required</div>

          <div className="login-input-wrap">
            <input className="login-input" type="password" placeholder="Password" value={pw} onChange={e => setPw(e.target.value)} autoFocus />
          </div>
          <button className="login-btn" type="submit" disabled={loading}>{loading ? '...' : 'ENTER'}</button>
        </form>
        <div className="login-error">{error}</div>
      </div>
    </div>
  );
}

function Clock() {

  const t = time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  return <span className="header-clock">{d} // {t}</span>;
}

}

function DebriefSection({ variant, icon, title, count, children, delay, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen !== false);
  return (
    <div className={`debrief-section debrief-section--${variant} animate-in`} style={{ animationDelay: delay || '0s' }}>
      <div className="debrief-section-hdr" onClick={() => setOpen(o => !o)}>
        <span className="debrief-section-icon">{icon}</span>
        <span className="debrief-section-title">{title}</span>
        {count != null && <span className="debrief-section-count">{count}</span>}
        <span className={`debrief-chevron ${open ? '' : 'debrief-chevron--closed'}`}>{'\u25BE'}</span>
      </div>
      {open && <div className="debrief-section-body">{children}</div>}
    </div>
  );
}

function TranscriptBar({ data }) {
  return (
    <div className="transcript-bar animate-in" style={{ animationDelay: '0.6s' }}>
      <div className="transcript-bar-hdr">
        <span className="transcript-bar-title">Transcripts Processed</span>
        <span className="transcript-bar-count">{data.transcriptsProcessed}</span>
      </div>
      <div className="transcript-grid">
        {data.transcripts.map((group, gi) => (
          <React.Fragment key={gi}>
            <span className="transcript-chip transcript-chip--day">{group.day}</span>
            {group.items.map((item, ii) => (<span key={ii} className="transcript-chip">{item}</span>))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function WeeklyDebriefView() {
  return (
    <div className="main-content">
      <div className="debrief-header animate-in">
        <div className="debrief-title">Weekly Debrief</div>
        <div className="debrief-meta">
          <span>{'\uD83D\uDCC5'} {DEBRIEF.week}</span>
          <span>{'\uD83C\uDFA4'} {DEBRIEF.transcriptsProcessed} transcripts</span>
        </div>
      </div>
      <div className="debrief-context animate-in" style={{ animationDelay: '0.05s' }}>
        <strong>Context:</strong> Bodhi is out Thu-Fri for his dad's living wake. Back Monday.
      </div>

      <DebriefSection variant="urgent" icon={'\uD83D\uDD34'} title="Do Today (Wed Mar 25)" count={DEBRIEF.doToday.length} delay="0.1s" defaultOpen={true}>
        <DebriefTaskList items={DEBRIEF.doToday} showNumbers={true} />
      </DebriefSection>

      <DebriefSection variant="priority" icon={'\uD83C\uDFAF'} title="Priority When Back Monday" count={DEBRIEF.priorityMonday.length} delay="0.15s" defaultOpen={true}>
        <DebriefTaskList items={DEBRIEF.priorityMonday} showNumbers={true} />
      </DebriefSection>

      <DebriefSection variant="delegated" icon={'\uD83E\uDDF1'} title="Covered While Out (Thu-Fri)" count={DEBRIEF.coveredWhileOut.length} delay="0.2s" defaultOpen={true}>
        <DebriefTaskList items={DEBRIEF.coveredWhileOut} showNumbers={false} />
      </DebriefSection>

      <DebriefSection variant="info" icon={'\u2139\uFE0F'} title="FYI / No Action" count={DEBRIEF.fyi.length} delay="0.25s" defaultOpen={true}>
        <DebriefTaskList items={DEBRIEF.fyi} showNumbers={false} />
      </DebriefSection>

      <DebriefSection variant="upcoming" icon={'\uD83D\uDCC6'} title="Upcoming" count={DEBRIEF.upcoming.length} delay="0.3s" defaultOpen={true}>
        <DebriefTaskList items={DEBRIEF.upcoming} showNumbers={false} />
      </DebriefSection>

      <TranscriptBar data={DEBRIEF} />
    </div>
  );
}

function DashboardView({ selectedProject }) {
  return (
    <main className="main-content">
      <NotificationBar items={ATTENTION_ITEMS} />
      <ActivityFeed items={ACTIVITY_FEED} filter={selectedProject} />
    </main>
  );
}

function App() {
  const [authenticated, setAuthenticated] = useState(false);
  const [theme, setTheme] = useState('dark');
  const [view, setView] = useState('debrief');
  const [selectedProject, setSelectedProject] = useState('all');

  const toggleTheme = useCallback(() => {
    setTheme(prev => {
      const next = prev === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      return next;
    });
  }, []);

  const activeAgents = useMemo(() =>
    AGENT_GROUPS.reduce((s, g) => s + g.agents.filter(a => a.status !== 'idle').length, 0), []);

  const handleProjectClick = useCallback((id) => {
    setSelectedProject(prev => prev === id ? 'all' : id);
    setView('dashboard');
  }, []);

  if (!authenticated) {
    return <LoginScreen onAuth={() => setAuthenticated(true)} />;
  }

  return (
    <div className="app-shell">
      <header className="header animate-in">
        <div className="header-left">
          <h1 className="header-title">COMMAND CENTER</h1>
          <Clock />
          <div className="header-status"><span className="pulse-dot pulse-dot--green" /><span>{activeAgents} agents active</span></div>
        </div>
        <div className="header-right"><ThemeToggle theme={theme} onToggle={toggleTheme} /></div>
      </header>

      <aside className="sidebar">
        <div className="nav-section">
          <div className={`nav-item ${view === 'dashboard' ? 'nav-item--active' : ''}`} onClick={() => setView('dashboard')}>
            <span className="nav-icon">{'\u2302'}</span><span className="nav-label">Dashboard</span>
          </div>
          <div className={`nav-item ${view === 'debrief' ? 'nav-item--active' : ''}`} onClick={() => setView('debrief')}>
            <span className="nav-icon">{'\uD83D\uDCCB'}</span><span className="nav-label">Weekly Debrief</span>
            <span className="nav-badge">NEW</span>
          </div>
        </div>
        <div className="nav-divider" />

        <div className="animate-in" style={{ animationDelay: '0.15s' }}>
          <SectionHdr title="Projects" count={PROJECTS.length} />
          <div className="project-list">
            {PROJECTS.map(p => (<ProjectCard key={p.id} project={p} selected={selectedProject === p.id} onClick={handleProjectClick} />))}
          </div>
        </div>

        <div className="animate-in" style={{ animationDelay: '0.3s' }}>
          <SectionHdr title="Agent Fleet" count={activeAgents + ' active'} />
          <AgentSection groups={AGENT_GROUPS} />
        </div>
      </aside>

      {view === 'dashboard' && <DashboardView selectedProject={selectedProject} />}
      {view === 'debrief' && <WeeklyDebriefView />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
